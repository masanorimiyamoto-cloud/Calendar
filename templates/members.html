<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンバー管理</title>
  <meta name="application-name" content="{{ app_name }}">
  <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('show_calendar') }}">{{ app_name }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="ナビゲーションを開く">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('show_calendar') }}">カレンダー</a></li>
          <li class="nav-item"><a class="nav-link active" href="{{ url_for('members') }}">メンバー管理</a></li>
          <li class="nav-item">
            <form method="post" action="{{ url_for('logout') }}" class="d-inline">
              <button type="submit" class="btn btn-link nav-link">ログアウト</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="card">
      <div class="card-header">メンバー管理</div>
      <div class="card-body">
        <p class="text-muted">ここで登録した人が、各予約の出欠表に表示されます。</p>

        <form method="post" action="{{ url_for('add_member') }}" class="row g-2 mb-4">
          <div class="col-12 col-sm">
            <input type="text" name="name" class="form-control" placeholder="メンバーの名前" required>
          </div>
          <div class="col-12 col-sm-auto">
            <button type="submit" class="btn btn-primary w-100">追加</button>
          </div>
        </form>

        <h2 class="h5">登録済みメンバー: {{ members|length }}名</h2>
        <ul class="list-group mb-3">
          {% for member in members %}
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ member.name }}</span>
            <form method="post" action="{{ url_for('delete_member', member_id=member.id) }}"
                  onsubmit="return confirm('{{ member.name }} さんを削除しますか？');" class="m-0">
              <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
            </form>
          </li>
          {% else %}
          <li class="list-group-item text-muted">まだメンバーが登録されていません。</li>
          {% endfor %}
        </ul>

        <a href="{{ url_for('show_calendar') }}" class="btn btn-secondary">カレンダーに戻る</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
