<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スコア結果を追加</title>
  <meta name="application-name" content="{{ app_name }}">
  <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('show_calendar') }}">{{ app_name }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="ナビゲーションを開く">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('show_calendar') }}">カレンダー</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('open_scoreboard') }}" target="_blank" rel="noopener">スコアボード</a></li>
          <li class="nav-item">
            <form method="post" action="{{ url_for('logout') }}" class="d-inline">
              <button type="submit" class="btn btn-link nav-link">ログアウト</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="card">
      <div class="card-header">スコア結果を追加</div>
      <div class="card-body">
        {% if error_message %}
        <div class="alert alert-danger">{{ error_message }}</div>
        {% endif %}

        <form method="post">
          <div class="mb-3">
            <label for="date" class="form-label">試合日</label>
            <input type="date" id="date" name="date" class="form-control" value="{{ date }}" required>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-12 col-sm-6">
              <label for="player_a" class="form-label">プレイヤー1</label>
              <input type="text" id="player_a" name="player_a" class="form-control" required>
            </div>
            <div class="col-12 col-sm-6">
              <label for="player_b" class="form-label">プレイヤー2</label>
              <input type="text" id="player_b" name="player_b" class="form-control" required>
            </div>
          </div>
          <div class="mb-3">
            <label for="score" class="form-label">スコア</label>
            <input type="text" id="score" name="score" class="form-control" placeholder="6-4 / 3-6 / 10-8" required>
          </div>
          <div class="mb-3">
            <label for="memo" class="form-label">メモ</label>
            <textarea id="memo" name="memo" class="form-control" rows="3" placeholder="大会名、ペア名、補足など"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">保存</button>
          <a href="{{ url_for('show_calendar') }}" class="btn btn-secondary ms-2">カレンダーに戻る</a>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% include "_ui_feedback.html" %}
</body>
</html>
