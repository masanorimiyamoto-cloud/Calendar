<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約を追加</title>
  <meta name="application-name" content="{{ app_name }}">
  <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('show_calendar') }}">{{ app_name }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="ナビゲーションを開く">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('show_calendar') }}">カレンダー</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('members') }}">メンバー管理</a></li>
          <li class="nav-item">
            <form method="post" action="{{ url_for('logout') }}" class="d-inline">
              <button type="submit" class="btn btn-link nav-link">ログアウト</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="card">
      <div class="card-header">コート予約を追加</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label for="date" class="form-label">予約日</label>
            <input type="date" id="date" name="date" class="form-control" value="{{ date }}" required>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-12 col-sm-6">
              <label for="start_time" class="form-label">開始時刻</label>
              <select id="start_time" name="start_time" class="form-select" required>
                <option value="">開始</option>
                {% for option in time_options %}
                <option value="{{ option.value }}">{{ option.label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12 col-sm-6">
              <label for="end_time" class="form-label">終了時刻</label>
              <select id="end_time" name="end_time" class="form-select" required>
                <option value="">終了</option>
                {% for option in time_options %}
                <option value="{{ option.value }}">{{ option.label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label for="title" class="form-label">タイトル</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="{{ default_event_title }}">
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">説明</label>
            <textarea id="description" name="description" class="form-control" placeholder="場所、コート番号、備考など"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">追加</button>
          <a href="{{ url_for('show_calendar') }}" class="btn btn-secondary ms-2">カレンダーに戻る</a>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% include "_ui_feedback.html" %}
</body>
</html>
