<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - {{ app_name }}</title>
  <meta name="application-name" content="{{ app_name }}">
  <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-5">
        <div class="card">
          <div class="card-header">{{ app_name }}</div>
          <div class="card-body">
            <h1 class="h4 mb-3">合言葉</h1>
            {% if error_message %}
            <div class="alert alert-danger">{{ error_message }}</div>
            {% endif %}
            <form method="post" action="{{ url_for('login', next=next_url) }}">
              <div class="mb-3">
                <label for="access_code" class="form-label">合言葉を入力</label>
                <input type="password" id="access_code" name="access_code" class="form-control" required autofocus>
              </div>
              <button type="submit" class="btn btn-primary w-100">入る</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
